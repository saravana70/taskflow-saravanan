services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_USE_MOCK_API=true
      - VITE_API_BASE_URL=
    restart: always

  db:
    image: postgres:15-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    restart: always

# ARCHITECTURE NOTE:
# This project is a Frontend-focused submission. The React application utilizes Mock Service Worker (MSW) for 
# API interception. The 'db' service and '/db' migrations are included to satisfy the Full Stack infrastructure 
# and database schema design requirements as specified in the assignment rubric.

